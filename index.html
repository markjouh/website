<!DOCTYPE html>
<html>
<head>
    <title>My Proofs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #fileList {
            margin-bottom: 20px;
        }
        #fileContent {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>My Proofs</h1>
    <div id="fileList"></div>
    <pre id="fileContent"></pre>

    <script>
        const repoOwner = 'markjouh';
        const repoName = 'marksite';
        const basePath = 'posts'; // Leave empty if files are in the root

        async function fetchFiles() {
            const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${basePath}`);
            const files = await response.json();
            const fileListElement = document.getElementById('fileList');

            files.forEach(file => {
                const link = document.createElement('a');
                link.href = '#';
                link.textContent = file.name;
                link.onclick = () => {
                    fetchFileContent(file.download_url);
                    return false;
                };
                fileListElement.appendChild(link);
                fileListElement.appendChild(document.createElement('br'));
            });
        }

        async function fetchFileContent(url) {
            const response = await fetch(url);
            const content = await response.text();
            document.getElementById('fileContent').textContent = content;
        }

        fetchFiles();
    </script>
</body>
</html>
