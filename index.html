<!DOCTYPE html>
<html>
<head>
    <title>My Proofs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        #file_list_container {
            width: 50%;
            padding-right: 20px;
        }
        #file_list {
            overflow-y: auto;
            max-height: calc(100vh - 40px - 20px); /* Subtract top and bottom padding and title height */
        }
        #file_content {
            position: fixed;
            right: 0;
            top: 60px; /* Align with the title */
            width: 50%;
            height: calc(100vh - 60px); /* Subtract top margin */
            overflow-y: auto;
            border-left: 2px solid #ccc;
            padding-left: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="file_list_container">
        <h1>My Proofs</h1>
        <div id="file_list"></div>
    </div>
    <div id="file_content"></div>

    <script>
        const repo_owner = 'markjouh';
        const repo_name = 'marksite';
        const base_path = 'posts';

        async function fetch_files() {
            const response = await fetch(`https://api.github.com/repos/${repo_owner}/${repo_name}/contents/${base_path}`);
            const files = await response.json();
            const file_list_element = document.getElementById('file_list');

            files.forEach(file => {
                const link = document.createElement('a');
                link.href = '#';
                link.textContent = file.name;
                link.onclick = () => {
                    fetch_file_content(file.download_url);
                    return false;
                };
                file_list_element.appendChild(link);
                file_list_element.appendChild(document.createElement('br'));
            });
        }

        async function fetch_file_content(url) {
            const response = await fetch(url);
            const content = await response.text();
            document.getElementById('file_content').textContent = content;
        }

        fetch_files();
    </script>
</body>
</html>
