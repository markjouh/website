<!DOCTYPE html>
<html>
<head>
    <title>My Proofs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
        }
        #file_list {
            width: 30%;
        }
        #file_content {
            white-space: pre-wrap;
            width: 70%;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div>
        <h1>My Proofs</h1>
        <div id="file_list"></div>
    </div>
    <pre id="file_content"></pre>

    <script>
        const repo_owner = 'markjouh';
        const repo_name = 'marksite';
        const base_path = 'posts';

        async function fetch_files() {
            const response = await fetch(`https://api.github.com/repos/${repo_owner}/${repo_name}/contents/${base_path}`);
            const files = await response.json();
            const file_list_element = document.getElementById('file_list');

            files.forEach(file => {
                const link = document.createElement('a');
                link.href = '#';
                link.textContent = file.name;
                link.onclick = () => {
                    fetch_file_content(file.download_url);
                    return false;
                };
                file_list_element.appendChild(link);
                file_list_element.appendChild(document.createElement('br'));
            });
        }

        async function fetch_file_content(url) {
            const response = await fetch(url);
            const content = await response.text();
            document.getElementById('file_content').textContent = content;
        }

        fetch_files();
    </script>
</body>
</html>
