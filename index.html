<!DOCTYPE html>
<html>
<head>
    <title>Mark Zhou</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/markjouh/marksite/main/favicon.ico">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 15px; /* Increased overall padding */
            box-sizing: border-box;
        }
        #file_list_container {
            width: 50%;
            padding-right: 10px;
            overflow-y: auto; /* Only scroll the left half */
            height: calc(100vh - 30px); /* Adjusted for increased padding */
            scrollbar-width: none; /* Hide scrollbar for Firefox */
            -ms-overflow-style: none;  /* Hide scrollbar for IE and Edge */
        }
        #file_list_container::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome, Safari, and Opera */
        }
        #file_list {
            margin-top: 0; /* Reduce space above the file list */
        }
        #file_content {
            position: absolute; /* Changed to absolute for full height coverage */
            right: 0;
            top: 0;
            width: 50%;
            height: 100vh;
            overflow-y: auto;
            border-left: 2px solid #ccc;
            padding: 15px; /* Adjusted padding */
            box-sizing: border-box;
        }
        h1 {
            margin-top: 0; /* Reduced space above the title */
            margin-bottom: 5px; /* Reduce space between title and caption */
        }
        .caption {
            margin-top: 0; /* Move the caption closer to the title */
            opacity: 0.6; /* Decrease the opacity */
            font-size: 0.9em; /* Adjust caption size if needed */
        }
    </style>
</head>
<body>
    <div id="file_list_container">
        <h1>Mark's Website</h1>
        <p class="caption">More like a glorified folder of text files</p>
        <div id="file_list"></div>
    </div>
    <div id="file_content"></div>

    <script>
        const repo_owner = 'markjouh';
        const repo_name = 'marksite';
        const base_path = 'posts';

        async function fetch_files() {
            const response = await fetch(`https://api.github.com/repos/${repo_owner}/${repo_name}/contents/${base_path}`);
            const files = await response.json();
            const file_list_element = document.getElementById('file_list');

            for (const file of files) {
                const content = await fetch_file_content(file.download_url);
                const firstLine = content.split('\n')[0];
                const link = document.createElement('a');
                link.href = '#';
                link.textContent = firstLine;
                link.onclick = () => {
                    const formattedContent = content.replace(/\n/g, '<br>'); // Replace newlines with <br> tags
                    document.getElementById('file_content').innerHTML = formattedContent;
                    return false;
                };
                file_list_element.appendChild(link);
                file_list_element.appendChild(document.createElement('br'));
            }
        }

        async function fetch_file_content(url) {
            const response = await fetch(url);
            return await response.text();
        }

        fetch_files();
    </script>
</body>
</html>
